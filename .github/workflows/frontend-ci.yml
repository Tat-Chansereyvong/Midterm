name: CI - Frontend

on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'
  workflow_dispatch: {}

jobs:
  test:
    name: Run frontend test suites
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format code with Prettier
        run: npx prettier --write "src/**/*.{ts,tsx,css,html,js,jsx}" || true

      - name: Check Prettier formatting
        run: npx prettier --check "src/**/*.{ts,tsx,css,html,js,jsx}"

      - name: Run lint
        run: npm run lint --if-present

      - name: Run unit tests
        run: npm test --if-present

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run e2e tests
        run: npm run test:e2e --if-present

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '✅ [PASS] Frontend tests passed — ${{ github.repository }} (${{ github.ref_name }})'
          to: ${{ github.event.head_commit.author.email }}, srengty@gmail.com
          from: 'CI Bot <${{ secrets.MAIL_USERNAME }}>'
          body: |
            Frontend tests passed for the following commit:

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit SHA : ${{ github.sha }}
            Author     : ${{ github.event.head_commit.author.name }} <${{ github.event.head_commit.author.email }}>
            Message    : ${{ github.event.head_commit.message }}

            View run   : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '❌ [FAIL] Frontend tests failed — ${{ github.repository }} (${{ github.ref_name }})'
          to: ${{ github.event.head_commit.author.email }}, srengty@gmail.com
          from: 'CI Bot <${{ secrets.MAIL_USERNAME }}>'
          body: |
            Frontend tests FAILED for the following commit. Please review and fix.

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit SHA : ${{ github.sha }}
            Author     : ${{ github.event.head_commit.author.name }} <${{ github.event.head_commit.author.email }}>
            Message    : ${{ github.event.head_commit.message }}

            View run   : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
