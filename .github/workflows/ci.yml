name: CI

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present

      - name: Run unit tests
        run: npm test -- --runInBand

  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run e2e tests
        run: npm run test:e2e -- --runInBand

  send-code:
    needs: [build, e2e]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create repo zip
        run: |
          apt-get update && apt-get install -y zip >/dev/null || true
          zip -r repo.zip . -x "node_modules/*" ".git/*" "coverage/*" "dist/*" "*.zip"

      - name: Send repo to committer + teacher
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          secure: true
          from: ${{ secrets.EMAIL_FROM }}
          to: ${{ github.event.pusher.email }}, srengty@gmail.com
          subject: 'Repository snapshot: ${{ github.repository }} @ ${{ github.sha }}'
          body: 'Attached is the repository snapshot for commit ${{ github.sha }} triggered by ${{ github.event.pusher.name }} (<${{ github.event.pusher.email }}>)'
          attachments: repo.zip
