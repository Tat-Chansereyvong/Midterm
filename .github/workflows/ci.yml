# Purpose: Defines the CI/CD pipeline for testing and email notification on main branch commits
name: Automated Test and Notify

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Purpose: Checks out the repository code into the virtual environment
      - name: Checkout code
        uses: actions/checkout@v3

      # Purpose: Configures the Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Purpose: Installs dependencies and runs the test suites
      - name: Install and Test
        run: |
          npm install
          npm run test
          npm run test:e2e

      # Purpose: Sends the status email to the committer and the external address
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 'GitHub Actions: Test Suite Completed'
          to: '${{ github.event.pusher.email }}, srengty@gmail.com'
          from: 'Automated CI Pipeline'
          body: 'The automated tests for the latest commit on the main branch have finished.'
