# Purpose: Core CI configuration tracking commits to branch master to run NestJS backend test suites
name: CI - Backend

on:
  push:
    branches: [master]

jobs:
  test:
    name: Run backend test suites
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json # Looks directly at the root of the master branch

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run unit & integration tests
        run: npm test -- --forceExit --ci

      - name: Run e2e tests
        run: npm run test:e2e -- --forceExit --ci

      # ── Notify on success ───────────────────────────────────────────────────
      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '✅ [PASS] Backend tests passed — ${{ github.repository }} (${{ github.ref_name }})'
          to: ${{ github.event.head_commit.author.email }}, srengty@gmail.com
          from: 'CI Bot <${{ secrets.MAIL_USERNAME }}>'
          body: |
            Backend tests passed successfully for this commit.

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit SHA : ${{ github.sha }}
            Author     : ${{ github.event.head_commit.author.name }}
            Message    : ${{ github.event.head_commit.message }}

            View run   : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # ── Notify on failure ───────────────────────────────────────────────────
      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '❌ [FAIL] Backend tests failed — ${{ github.repository }} (${{ github.ref_name }})'
          to: ${{ github.event.head_commit.author.email }}, srengty@gmail.com
          from: 'CI Bot <${{ secrets.MAIL_USERNAME }}>'
          body: |
            Backend tests FAILED for this commit. Please review and fix.

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit SHA : ${{ github.sha }}
            Author     : ${{ github.event.head_commit.author.name }}
            Message    : ${{ github.event.head_commit.message }}

            View run   : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
