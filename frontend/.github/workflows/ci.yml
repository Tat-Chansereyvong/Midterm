# Purpose: Core CI configuration tracking commits to branch frontend to run React frontend test suites
name: CI - Frontend

on:
  push:
    branches: [frontend] # Triggers only when pushing to frontend

jobs:
  test:
    name: Run frontend test suites
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-web # Change this if your frontend folder name is different

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-web/package-lock.json # Change this if your frontend folder name is different

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run unit tests
        run: npm test --if-present

      - name: Run E2E tests (Cypress)
        run: npx cypress run --if-present

      # ── Notify on success ───────────────────────────────────────────────────
      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ [PASS] Frontend tests passed — ${{ github.repository }} (${{ github.ref_name }})"
          to: ${{ github.event.head_commit.author.email }}, srengty@gmail.com
          from: "CI Bot <${{ secrets.MAIL_USERNAME }}>"
          body: |
            Frontend tests passed successfully for this commit.

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit SHA : ${{ github.sha }}
            Author     : ${{ github.event.head_commit.author.name }}
            Message    : ${{ github.event.head_commit.message }}

            View run   : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # ── Notify on failure ───────────────────────────────────────────────────
      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ [FAIL] Frontend tests failed — ${{ github.repository }} (${{ github.ref_name }})"
          to: ${{ github.event.head_commit.author.email }}, srengty@gmail.com
          from: "CI Bot <${{ secrets.MAIL_USERNAME }}>"
          body: |
            Frontend tests FAILED for this commit. Please review and fix.

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit SHA : ${{ github.sha }}
            Author     : ${{ github.event.head_commit.author.name }}
            Message    : ${{ github.event.head_commit.message }}

            View run   : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
